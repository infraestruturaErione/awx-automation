---
- hosts: all
  become: yes

  vars:
    db_name: "{{ env_name | replace('-', '_') }}_data_city"

  tasks:
    - name: criar diretório frontData
      file:
        path: "/var/www/{{ env_name }}-frontData"
        state: directory

    - name: criar diretório serviceData
      file:
        path: "/var/www/{{ env_name }}-serviceData"
        state: directory

    - name: copiar frontData
      synchronize:
        src: /var/www/default/frontData/
        dest: "/var/www/{{ env_name }}-frontData/"
        recursive: yes
      delegate_to: "{{ inventory_hostname }}"

    - name: atualizar VITE_API_BASE_URL no .env do front
      lineinfile:
        path: "/var/www/{{ env_name }}-frontData/.env"
        regexp: '^VITE_API_BASE_URL='
        line: "VITE_API_BASE_URL=https://{{ env_name }}.deepvis.com.br/backend"

    - name: atualizar VITE AWS Access Key no .env do front
      lineinfile:
        path: "/var/www/{{ env_name }}-frontData/.env"
        regexp: '^VITE_AWS3_ACCESS_KEY_ID='
        line: "VITE_AWS3_ACCESS_KEY_ID={{ aws_access_key }}"

    - name: atualizar VITE AWS Secret Key no .env do front
      lineinfile:
        path: "/var/www/{{ env_name }}-frontData/.env"
        regexp: '^VITE_AWS3_SECRET_ACCESS_KEY='
        line: "VITE_AWS3_SECRET_ACCESS_KEY={{ aws_secret_key }}"

    - name: instalar dependências do front
      command: npm install
      args:
        chdir: "/var/www/{{ env_name }}-frontData"
      become: yes
      become_user: erione

    - name: build do front
      command: npm run build
      args:
        chdir: "/var/www/{{ env_name }}-frontData"
      become: yes
      become_user: erione

    - name: corrigir permissões do frontData
      file:
        path: "/var/www/{{ env_name }}-frontData"
        owner: www-data
        group: www-data
        recurse: yes

    - name: gerar arquivo .env
      template:
        src: templates/env.j2
        dest: "/var/www/{{ env_name }}-serviceData/.env"

    - name: criar banco mysql
      command: >
        mysql -u root -p540298cb
        -e "CREATE DATABASE {{ db_name }};"

    - name: gerar APP_KEY do Laravel
      command: php artisan key:generate
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: rodar migrate
      command: php artisan migrate --force
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: limpar cache laravel
      command: php artisan optimize:clear
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: gerar virtualhost apache
      template:
        src: templates/vhost.conf.j2
        dest: "/etc/apache2/sites-available/{{ env_name }}.conf"

    - name: ativar site no apache
      command: a2ensite {{ env_name }}.conf

    - name: reload apache
      service:
        name: apache2
        state: reloaded
