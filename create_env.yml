---
- hosts: all
  become: yes

  vars:
    db_name: "{{ env_name | replace('-', '_') }}_data_city"
    node_path: "/home/erione/.nvm/versions/node/v21.5.0/bin"
    npm_bin: "{{ node_path }}/npm"

  tasks:

    # ========================
    # FRONT
    # ========================

    - name: criar diretório frontData
      file:
        path: "/var/www/{{ env_name }}-frontData"
        state: directory

    - name: copiar frontData (sem .env)
      synchronize:
        src: /var/www/default/frontData/
        dest: "/var/www/{{ env_name }}-frontData/"
        recursive: yes
        rsync_opts:
          - "--exclude=.env"
      delegate_to: "{{ inventory_hostname }}"

    - name: gerar .env do front
      template:
        src: templates/front_env.j2
        dest: "/var/www/{{ env_name }}-frontData/.env"

    - name: dar permissão ao erione no frontData
      file:
        path: "/var/www/{{ env_name }}-frontData"
        owner: erione
        group: www-data
        recurse: yes

    - name: instalar dependências do front
      command: "{{ npm_bin }} install"
      args:
        chdir: "/var/www/{{ env_name }}-frontData"
      become: yes
      become_user: erione
      environment:
        PATH: "{{ node_path }}:/usr/local/bin:/usr/bin:/bin"

    - name: build do front
      command: "{{ npm_bin }} run build"
      args:
        chdir: "/var/www/{{ env_name }}-frontData"
      become: yes
      become_user: erione
      environment:
        PATH: "{{ node_path }}:/usr/local/bin:/usr/bin:/bin"

    - name: devolver frontData para root
      file:
        path: "/var/www/{{ env_name }}-frontData"
        owner: root
        group: root
        recurse: yes

    # ========================
    # BACK (SERVICE)  ← NÃO MEXI
    # ========================

    - name: criar diretório serviceData
      file:
        path: "/var/www/{{ env_name }}-serviceData"
        state: directory

    - name: copiar serviceData
      synchronize:
        src: /var/www/default/serviceData/
        dest: "/var/www/{{ env_name }}-serviceData/"
        recursive: yes
      delegate_to: "{{ inventory_hostname }}"

    - name: dar permissão ao erione no serviceData
      file:
        path: "/var/www/{{ env_name }}-serviceData"
        owner: erione
        group: www-data
        recurse: yes

    - name: gerar arquivo .env
      template:
        src: templates/env.j2
        dest: "/var/www/{{ env_name }}-serviceData/.env"

    - name: criar banco mysql
      command: >
        mysql -u root -p540298cb
        -e "CREATE DATABASE {{ db_name }};"

    - name: gerar APP_KEY do Laravel
      command: php artisan key:generate
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: rodar migrate
      command: php artisan migrate --force
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: limpar cache laravel
      command: php artisan optimize:clear
      args:
        chdir: "/var/www/{{ env_name }}-serviceData"

    - name: devolver serviceData para root
      file:
        path: "/var/www/{{ env_name }}-serviceData"
        owner: root
        group: root
        recurse: yes

    # ========================
    # APACHE
    # ========================

    - name: gerar virtualhost apache
      template:
        src: templates/vhost.conf.j2
        dest: "/etc/apache2/sites-available/{{ env_name }}.conf"

    - name: ativar site no apache
      command: a2ensite {{ env_name }}.conf

    - name: reload apache
      service:
        name: apache2
        state: reloaded
